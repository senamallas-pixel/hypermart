name: Android CI

on:
  push:
    branches: [main]
    paths:
      - "frontend_android/**"
  pull_request:
    paths:
      - "frontend_android/**"

jobs:
  test:
    name: Unit tests & dependency check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend_android/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --ci --coverage --coverageReporters=text-summary

      - name: Verify Expo config is valid
        run: npx expo config --type introspect > /dev/null
        continue-on-error: true

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Android CI"
            echo "- Branch: \`${{ github.head_ref || github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            if [ "${{ job.status }}" = "success" ]; then
              echo "- Tests: ✅ passed"
            else
              echo "- Tests: ❌ failed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
