name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - "Backend_python/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            || (echo "Deploy hook failed" && exit 1)
