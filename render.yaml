# HyperMart Backend Service Configuration
# Note: PostgreSQL database is created separately in Render dashboard
# DATABASE_URL must be set manually in Environment Variables

services:
  - type: web
    name: hypermart-api
    runtime: python
    rootDir: backend
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: SQL_ECHO
        value: "false"
